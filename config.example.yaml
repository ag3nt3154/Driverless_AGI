# Copy to config.yaml and fill in your values.
# config.yaml is gitignored.
#
# Each model entry:
#   name        — human-readable label shown in the UI
#   model       — model string sent verbatim to the API
#   api_url     — provider base URL
#   api_key_env — name of the env var in .env that holds the API key

default_model: gpt-4o-openai

# Reasoning / thinking effort for models that support it.
# Values: none | low | medium | high
# "none" disables thinking. low/medium/high map to the provider's reasoning effort.
# For models with binary thinking (on/off), any value other than "none" enables it.
# Note: higher thinking effort increases token usage and cost.
# Can also be set per-model (see commented example below).
thinking: none

max_iterations: 20

models:
  gpt-4o-openai:
    name: "GPT-4o (OpenAI)"
    model: "gpt-4o"
    api_url: "https://api.openai.com/v1"
    api_key_env: "OPENAI_API_KEY"

  gpt-4o-mini-openai:
    name: "GPT-4o Mini (OpenAI)"
    model: "gpt-4o-mini"
    api_url: "https://api.openai.com/v1"
    api_key_env: "OPENAI_API_KEY"

  claude-sonnet-openrouter:
    name: "Claude Sonnet 4.6 (OpenRouter)"
    model: "anthropic/claude-sonnet-4-6"
    api_url: "https://openrouter.ai/api/v1"
    api_key_env: "OPENROUTER_API_KEY"

  claude-opus-openrouter:
    name: "Claude Opus 4.6 (OpenRouter)"
    model: "anthropic/claude-opus-4-6"
    api_url: "https://openrouter.ai/api/v1"
    api_key_env: "OPENROUTER_API_KEY"

  # Example: per-model thinking override (overrides global `thinking:` above)
  # qwen3-30b-openrouter:
  #   name: "Qwen3 30B (OpenRouter)"
  #   model: "qwen/qwen3-30b-a3b"
  #   api_url: "https://openrouter.ai/api/v1"
  #   api_key_env: "OPENROUTER_API_KEY"
  #   thinking: high
